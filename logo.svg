<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="LaBelle monogram">
  <defs>
    <linearGradient id="lb-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b97a"/>
      <stop offset="55%" stop-color="#d98a3d"/>
      <stop offset="100%" stop-color="#a8631f"/>
    </linearGradient>
    <linearGradient id="lb-flourish" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d98a3d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f0b97a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d98a3d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#lb-stroke)" stroke-width="2" opacity="0.55"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#d98a3d" stroke-width="0.75" opacity="0.35"/>

  <!-- Fancy serif L -->
  <g fill="url(#lb-stroke)">
    <!-- Vertical stem with tapered serifs -->
    <path d="
      M 70 42
      C 76 42, 82 44, 86 46
      L 86 52
      C 82 50, 78 49, 75 49
      L 75 144
      C 80 144, 86 143, 92 141
      L 92 148
      C 86 150, 80 151, 75 151
      L 75 154
      C 82 155, 90 156, 100 156
      L 100 162
      C 88 162, 78 161, 70 160
      C 62 161, 56 162, 52 162
      L 52 156
      C 56 156, 60 155, 64 154
      L 64 49
      C 60 49, 56 50, 52 51
      L 52 45
      C 58 43, 64 42, 70 42 Z"/>

    <!-- Bottom horizontal arm with curled terminal -->
    <path d="
      M 100 156
      C 118 156, 134 154, 146 150
      C 154 147, 160 142, 162 134
      L 156 134
      C 154 140, 149 144, 142 146
      C 130 150, 116 151, 100 151
      Z"/>

    <!-- Decorative top serif curl -->
    <path d="
      M 64 42
      C 60 38, 55 36, 50 37
      C 46 38, 44 41, 44 44
      C 44 41, 47 39, 51 39
      C 56 39, 62 41, 66 45
      Z"/>
  </g>

  <!-- Flourish swash beneath the L -->
  <path d="M 40 172 Q 100 184 170 172"
        fill="none" stroke="url(#lb-flourish)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="100" cy="178" r="1.6" fill="#f0b97a"/>
</svg>
